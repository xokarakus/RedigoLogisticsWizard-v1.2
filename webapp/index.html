<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redigo Logistics Cockpit</title>
  <style>
    .errBox { padding: 20px; margin: 20px; background: #fff3f3; border: 2px solid #cc0000; border-radius: 8px; font-family: monospace; font-size: 13px; color: #cc0000; white-space: pre-wrap; }
    #loadMsg { padding: 40px; font-family: Arial; color: #555; }
  </style>
  <script>
    window.onerror = function(msg, url, line, col, err) {
      if (msg === "Script error." && !url) return true;
      var detail = msg + "\n" + (url || "(unknown)") + ":" + line;
      if (err && err.stack) detail += "\n" + err.stack;
      document.body.insertAdjacentHTML("beforeend", '<div class="errBox">JS Error: ' + detail + '</div>');
    };
    window.addEventListener("unhandledrejection", function(e) {
      var msg = e.reason ? (e.reason.message || String(e.reason)) : "Unknown";
      var stack = e.reason && e.reason.stack ? "\n" + e.reason.stack : "";
      document.body.insertAdjacentHTML("beforeend", '<div class="errBox">Unhandled Promise: ' + msg + stack + '</div>');
    });
  </script>
  <script
    id="sap-ui-bootstrap"
    src="https://ui5.sap.com/resources/sap-ui-core.js"
    data-sap-ui-theme="sap_horizon"
    data-sap-ui-language="tr"
    data-sap-ui-resourceroots='{"com.redigo.logistics.cockpit": "./"}'
    data-sap-ui-compatVersion="edge"
    data-sap-ui-async="true"
    data-sap-ui-libs="sap.m,sap.ui.layout,sap.ui.table,sap.ui.unified"
  ></script>
  <script>
    function showErr(msg) {
      document.body.insertAdjacentHTML("beforeend", '<div class="errBox">' + msg + '</div>');
    }
    sap.ui.require([
      "sap/ui/core/Component",
      "sap/ui/core/ComponentContainer"
    ], function (Component, ComponentContainer) {
      document.getElementById("loadMsg").textContent = "Component olusturuluyor...";
      Component.create({
        name: "com.redigo.logistics.cockpit"
      }).then(function (oComponent) {
        document.getElementById("loadMsg").textContent = "Component OK, rendering...";
        new ComponentContainer({
          component: oComponent,
          height: "100%"
        }).placeAt("content");
      }).catch(function (err) {
        showErr("Component.create FAILED:\n" + err.message + "\n\n" + (err.stack || ""));
      });
    });
  </script>
</head>
<body class="sapUiBody sapUiSizeCompact" id="content">
  <div id="loadMsg">SAPUI5 yukleniyor...</div>
</body>
</html>
