<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redigo Logistics — Sifre Sifirlama</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      background: linear-gradient(135deg, #0a1628 0%, #1a2d50 50%, #0d2137 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.25);
      width: 100%;
      max-width: 440px;
      overflow: hidden;
    }

    .card-header {
      background: linear-gradient(135deg, #0854A0 0%, #1070CA 100%);
      padding: 32px 36px;
      text-align: center;
    }
    .card-header h1 {
      color: #fff;
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .card-header p {
      color: rgba(255,255,255,0.75);
      font-size: 13px;
    }
    .card-header .lock-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 16px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
    }

    .card-body {
      padding: 36px;
    }

    .form-group {
      margin-bottom: 22px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }
    .form-group .input-wrapper {
      position: relative;
    }
    .form-group input {
      width: 100%;
      padding: 12px 44px 12px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      background: #fafbfc;
    }
    .form-group input:focus {
      border-color: #0854A0;
      box-shadow: 0 0 0 3px rgba(8,84,160,0.12);
      background: #fff;
    }
    .form-group input.error {
      border-color: #dc3545;
      box-shadow: 0 0 0 3px rgba(220,53,69,0.12);
    }
    .form-group .toggle-pass {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 18px;
      color: #888;
      user-select: none;
      background: none;
      border: none;
    }
    .form-group .toggle-pass:hover { color: #0854A0; }

    .strength-bar {
      height: 4px;
      border-radius: 2px;
      background: #e9ecef;
      margin-top: 8px;
      overflow: hidden;
    }
    .strength-bar .fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s, background 0.3s;
      width: 0%;
    }

    .hint {
      font-size: 12px;
      color: #888;
      margin-top: 6px;
    }
    .error-text {
      font-size: 12px;
      color: #dc3545;
      margin-top: 6px;
      display: none;
    }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #0854A0, #1070CA);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.3px;
    }
    .btn-submit:hover { opacity: 0.92; }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* States */
    .state { display: none; text-align: center; padding: 40px 36px; }
    .state.active { display: block; }
    .state .icon { font-size: 48px; margin-bottom: 16px; }
    .state h2 { font-size: 20px; color: #1a1a1a; margin-bottom: 12px; }
    .state p { font-size: 14px; color: #666; line-height: 1.6; }
    .state .btn-login {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 32px;
      background: #0854A0;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }

    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="card">
    <div class="card-header">
      <div class="lock-icon">&#128274;</div>
      <h1>Redigo Logistics</h1>
      <p>Yeni sifrenizi belirleyin</p>
    </div>

    <!-- Form State -->
    <div id="formState" class="card-body state active">
      <form id="resetForm" autocomplete="off">
        <div class="form-group">
          <label for="newPassword">Yeni Sifre</label>
          <div class="input-wrapper">
            <input type="password" id="newPassword" placeholder="En az 6 karakter" autocomplete="new-password" />
            <button type="button" class="toggle-pass" onclick="togglePass('newPassword', this)">&#128065;</button>
          </div>
          <div class="strength-bar"><div class="fill" id="strengthFill"></div></div>
          <div class="hint" id="strengthHint">En az 6 karakter giriniz</div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Sifre Tekrari</label>
          <div class="input-wrapper">
            <input type="password" id="confirmPassword" placeholder="Sifrenizi tekrar girin" autocomplete="new-password" />
            <button type="button" class="toggle-pass" onclick="togglePass('confirmPassword', this)">&#128065;</button>
          </div>
          <div class="error-text" id="matchError">Sifreler eslesmiyor</div>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn" disabled>
          Sifreyi Degistir
        </button>
      </form>
    </div>

    <!-- Success State -->
    <div id="successState" class="state">
      <div class="icon">&#9989;</div>
      <h2>Sifreniz Degistirildi</h2>
      <p>Yeni sifrenizle sisteme giris yapabilirsiniz.</p>
      <a href="/" class="btn-login">Giris Yap</a>
    </div>

    <!-- Error State -->
    <div id="errorState" class="state">
      <div class="icon">&#9888;&#65039;</div>
      <h2>Islem Basarisiz</h2>
      <p id="errorMessage">Gecersiz veya suresi dolmus baglanti.</p>
      <a href="/" class="btn-login">Ana Sayfaya Don</a>
    </div>
  </div>

  <script>
    var token = new URLSearchParams(window.location.search).get('token');
    if (!token) {
      showState('errorState', 'Gecersiz baglanti. Sifre sifirlama linkinizi kontrol edin.');
    }

    var newPassEl = document.getElementById('newPassword');
    var confirmEl = document.getElementById('confirmPassword');
    var submitBtn = document.getElementById('submitBtn');
    var strengthFill = document.getElementById('strengthFill');
    var strengthHint = document.getElementById('strengthHint');
    var matchError = document.getElementById('matchError');

    function togglePass(id, btn) {
      var el = document.getElementById(id);
      if (el.type === 'password') {
        el.type = 'text';
        btn.innerHTML = '&#128064;';
      } else {
        el.type = 'password';
        btn.innerHTML = '&#128065;';
      }
    }

    function getStrength(pass) {
      var score = 0;
      if (pass.length >= 6) score++;
      if (pass.length >= 10) score++;
      if (/[A-Z]/.test(pass)) score++;
      if (/[0-9]/.test(pass)) score++;
      if (/[^A-Za-z0-9]/.test(pass)) score++;
      return score;
    }

    function validate() {
      var pass = newPassEl.value;
      var confirm = confirmEl.value;

      // Strength
      var s = getStrength(pass);
      var pct = Math.min(s * 20, 100);
      var colors = ['#dc3545', '#dc3545', '#ffc107', '#28a745', '#28a745', '#0854A0'];
      var labels = ['Cok zayif', 'Zayif', 'Orta', 'Iyi', 'Guclu', 'Cok guclu'];
      strengthFill.style.width = pct + '%';
      strengthFill.style.background = colors[s] || '#e9ecef';
      strengthHint.textContent = pass.length > 0 ? labels[s] : 'En az 6 karakter giriniz';

      // Match
      var matching = confirm.length === 0 || pass === confirm;
      matchError.style.display = matching ? 'none' : 'block';
      confirmEl.classList.toggle('error', !matching);

      // Enable submit
      submitBtn.disabled = pass.length < 6 || pass !== confirm;
    }

    newPassEl.addEventListener('input', validate);
    confirmEl.addEventListener('input', validate);

    document.getElementById('resetForm').addEventListener('submit', function (e) {
      e.preventDefault();
      if (submitBtn.disabled) return;

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span>Isleniyor...';

      // API base URL - same origin
      var apiUrl = window.location.origin + '/api/auth/reset-password';

      fetch(apiUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: token, new_password: newPassEl.value })
      })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (data.error) {
          showState('errorState', data.error);
        } else {
          showState('successState');
        }
      })
      .catch(function () {
        showState('errorState', 'Baglanti hatasi. Lutfen tekrar deneyin.');
      });
    });

    function showState(id, msg) {
      document.getElementById('formState').classList.remove('active');
      document.getElementById('successState').classList.remove('active');
      document.getElementById('errorState').classList.remove('active');
      document.getElementById(id).classList.add('active');
      if (msg && id === 'errorState') {
        document.getElementById('errorMessage').textContent = msg;
      }
    }
  </script>
</body>
</html>
