specVersion: "3.0"
metadata:
  name: com.redigo.logistics.cockpit
type: application
framework:
  name: SAPUI5
  version: "1.128.1"
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: sap.ui.layout
    - name: sap.ui.table
    - name: sap.ui.unified
    - name: sap.tnt

builder:
  componentPreload:
    paths:
      - "controller/"
      - "view/"
      - "model/"
      - "util/"
      - "i18n/"
  cachebuster: true
  minification: true

resources:
  configuration:
    propertiesFileSourceEncoding: UTF-8
